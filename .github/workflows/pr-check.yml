name: PR check

# Build gate for pull requests. Fails the PR if the site doesn't build, so broken
# changes can't be merged into staging or main. No deploy — just validation.

on:
  pull_request:
    branches: [main, staging]

permissions:
  contents: read

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build (production base)
        run: npm run build
        env:
          SITE: https://vmyronovych.github.io
          BASE: /oselia-web
