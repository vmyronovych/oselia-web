name: Deploy staging (PR preview)

# Every pull request into `main` is built and published to the staging slot:
#   https://vmyronovych.github.io/oselia-web/staging/   (noindex)
# This same job is the required `build` status check — if it fails, the PR can't be
# merged. There is a single staging slot, so the most recently updated PR owns it.

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: write

# Serialize all gh-pages publishes (staging + production share the branch). Never
# cancel in-progress — cancelling could abort a production publish in the same group.
concurrency:
  group: gh-pages-publish
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build (staging)
        run: npm run build
        env:
          SITE: https://vmyronovych.github.io
          BASE: /oselia-web/staging

      - name: Mark as noindex
        run: |
          find dist -name '*.html' -print0 \
            | xargs -0 sed -i 's#</head>#<meta name="robots" content="noindex,nofollow"></head>#'

      - name: Publish to gh-pages (/staging)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          destination_dir: staging
          # Keep the production site at the root intact.
          keep_files: true
          commit_message: "deploy(staging): PR #${{ github.event.pull_request.number }} (${{ github.sha }})"
