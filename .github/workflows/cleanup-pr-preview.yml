name: Clean up PR preview

# When a PR closes (merged or not), remove its preview folder from gh-pages so
# previews don't accumulate.

on:
  pull_request:
    branches: [main]
    types: [closed]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: gh-pages-publish
  cancel-in-progress: false

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0

      - name: Remove the PR's preview folder
        env:
          PR: ${{ github.event.pull_request.number }}
        run: |
          if [ -d "pr-$PR" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git rm -rq "pr-$PR"
            git commit -q -m "cleanup(preview): remove PR #$PR"
            git push
            echo "removed pr-$PR"
          else
            echo "no preview folder for PR #$PR"
          fi

      - name: Note removal on the PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const n = context.issue.number;
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: n,
              body: `🧹 Preview environment for PR #${n} has been removed.`,
            });
