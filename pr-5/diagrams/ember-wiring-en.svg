<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 512" role="img"
     aria-label="A 24 V power supply, an OSELIA Ember DI-16X input expander and a wall switch on a DIN rail, its I²C bus linked to a Hearth gateway"
     font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <rect x="6" y="6" width="828" height="500" rx="16" fill="#121419" stroke="#262b36"/>

  <!-- ── DIN rail (behind the modules, through their middle) ─── -->
  <g>
    <rect x="52" y="175" width="586" height="32" rx="3" fill="#5b606c"/>
    <rect x="52" y="175" width="586" height="5"  rx="3" fill="#727885"/>
    <g fill="#383d47">
      <rect x="58" y="186" width="18" height="11" rx="1.5"/><rect x="186" y="186" width="18" height="11" rx="1.5"/>
      <rect x="604" y="186" width="16" height="11" rx="1.5"/>
    </g>
    <text x="10" y="196" font-size="10.5" fill="#6f7689">DIN rail</text>
  </g>

  <!-- ── AC mains source ────────────────────────────────────── -->
  <g>
    <circle cx="40" cy="252" r="19" fill="none" stroke="#8b93a5" stroke-width="2"/>
    <path d="M31 252 q4.5 -7 9 0 t9 0" fill="none" stroke="#8b93a5" stroke-width="2"/>
    <text x="40" y="296" font-size="10.5" fill="#9aa1b1" text-anchor="middle">~230 V AC</text>
    <path d="M59 246 H82" stroke="#8b93a5" stroke-width="2"/>
    <path d="M59 260 H82" stroke="#8b93a5" stroke-width="2"/>
  </g>

  <!-- ── Power supply module ────────────────────────────────── -->
  <g>
    <rect x="86" y="66" width="92" height="250" rx="7" fill="#d8d6ce" stroke="#b4b2a8" stroke-width="1.5"/>
    <rect x="94" y="74" width="76" height="40" rx="3" fill="#c8c6bd"/>
    <g stroke="#b0aea4" stroke-width="1.4">
      <path d="M102 82 H162"/><path d="M102 90 H162"/><path d="M102 98 H162"/><path d="M102 106 H162"/>
    </g>
    <text x="132" y="150" font-size="20" font-weight="700" fill="#2a2d33" text-anchor="middle">24 V</text>
    <text x="132" y="170" font-size="10" fill="#6c6f78" text-anchor="middle">DC power</text>
    <text x="132" y="184" font-size="10" fill="#6c6f78" text-anchor="middle">supply</text>
    <rect x="80" y="228" width="9" height="42" rx="2" fill="#2f8f5f" stroke="#247048"/>
    <circle cx="84.5" cy="242" r="2.4" fill="#e08a3c"/><circle cx="84.5" cy="256" r="2.4" fill="#e08a3c"/>
    <rect x="104" y="300" width="56" height="18" rx="3" fill="#2f8f5f" stroke="#247048"/>
    <circle cx="118" cy="309" r="2.6" fill="#e08a3c"/><circle cx="146" cy="309" r="2.6" fill="#e08a3c"/>
    <text x="118" y="296" font-size="8.5" fill="#3a3d44" text-anchor="middle">+24V</text>
    <text x="146" y="296" font-size="8.5" fill="#3a3d44" text-anchor="middle">0V</text>
  </g>

  <!-- ── OSELIA Ember DI-16X ────────────────────────────────── -->
  <g>
    <rect x="206" y="66" width="392" height="250" rx="9" fill="#dcdad2" stroke="#b6b4ab" stroke-width="1.5"/>
    <g fill="#c6c4bb" stroke="#b0aea4"><circle cx="222" cy="82" r="5"/><circle cx="582" cy="82" r="5"/><circle cx="222" cy="300" r="5"/><circle cx="582" cy="300" r="5"/></g>

    <!-- TOP: every terminal labelled — G16 G15 COM, then I16…I1 (I1 rightmost) -->
    <rect x="222" y="62" width="362" height="22" rx="3" fill="#2f8f5f" stroke="#247048"/>
    <g fill="#16181d">
      <rect x="230" y="68" width="9" height="11" rx="1.5"/><rect x="248" y="68" width="9" height="11" rx="1.5"/>
      <rect x="266" y="68" width="9" height="11" rx="1.5"/><rect x="284" y="68" width="9" height="11" rx="1.5"/>
      <rect x="302" y="68" width="9" height="11" rx="1.5"/><rect x="320" y="68" width="9" height="11" rx="1.5"/>
      <rect x="338" y="68" width="9" height="11" rx="1.5"/><rect x="356" y="68" width="9" height="11" rx="1.5"/>
      <rect x="374" y="68" width="9" height="11" rx="1.5"/><rect x="392" y="68" width="9" height="11" rx="1.5"/>
      <rect x="410" y="68" width="9" height="11" rx="1.5"/><rect x="428" y="68" width="9" height="11" rx="1.5"/>
      <rect x="446" y="68" width="9" height="11" rx="1.5"/><rect x="464" y="68" width="9" height="11" rx="1.5"/>
      <rect x="482" y="68" width="9" height="11" rx="1.5"/><rect x="500" y="68" width="9" height="11" rx="1.5"/>
      <rect x="518" y="68" width="9" height="11" rx="1.5"/><rect x="536" y="68" width="9" height="11" rx="1.5"/>
      <rect x="554" y="68" width="9" height="11" rx="1.5"/>
    </g>
    <g fill="#4cc08a"><circle cx="234.5" cy="73.5" r="2"/><circle cx="252.5" cy="73.5" r="2"/><circle cx="270.5" cy="73.5" r="2"/></g>
    <circle cx="558.5" cy="73.5" r="2" fill="#ffb02e"/>
    <g font-size="6" fill="#5f6b63" text-anchor="middle">
      <text x="234.5" y="96">G16</text><text x="252.5" y="96">G15</text><text x="270.5" y="96">COM</text>
      <text x="288.5" y="96">I16</text><text x="306.5" y="96">I15</text><text x="324.5" y="96">I14</text>
      <text x="342.5" y="96">I13</text><text x="360.5" y="96">I12</text><text x="378.5" y="96">I11</text>
      <text x="396.5" y="96">I10</text><text x="414.5" y="96">I9</text><text x="432.5" y="96">I8</text>
      <text x="450.5" y="96">I7</text><text x="468.5" y="96">I6</text><text x="486.5" y="96">I5</text>
      <text x="504.5" y="96">I4</text><text x="522.5" y="96">I3</text><text x="540.5" y="96">I2</text>
      <text x="558.5" y="96">I1</text>
    </g>

    <!-- centred printed label -->
    <rect x="218" y="104" width="368" height="162" rx="6" fill="#f5f4ef" stroke="#dcdad1"/>
    <svg x="342" y="110" width="120" height="61" viewBox="0 53 92 49" preserveAspectRatio="xMidYMid meet">
      <g transform="matrix(1 0 0 -1 0 172.91)">
        <path d="M32.88,93.54 L58.96,93.54 L58.96,109.98 L45.92,117.92 L32.88,109.98 Z " fill="#0d9488"/>
        <circle cx="45.92" cy="102.33" r="3.26" fill="#ffffff"/>
        <circle cx="45.92" cy="102.33" r="1.28" fill="#0d9488"/>
        <text transform="translate(26.17,82.20) scale(1,-1)" font-family="Helvetica, Arial, sans-serif" font-weight="bold" font-size="9.40" fill="#1f2937">OSELIA</text>
        <text transform="translate(23.14,72.00) scale(1,-1)" font-family="Helvetica, Arial, sans-serif" font-weight="normal" font-size="3.50" letter-spacing="0.35" fill="#0f766e">SMART AUTOMATION</text>
      </g>
    </svg>
    <text x="402" y="206" font-size="24" font-weight="800" fill="#23262c" text-anchor="middle">Ember <tspan font-size="15" font-weight="600" fill="#6c6f78">DI-16X</tspan></text>
    <text x="402" y="225" font-size="9.5" fill="#6c6f78" text-anchor="middle">16-channel 24 V discrete input expander</text>
    <g font-size="9" fill="#3a3d44" text-anchor="middle">
      <rect x="254" y="238" width="90" height="20" rx="10" fill="#fff" stroke="#cfcdc4"/><text x="299" y="251">I²C EXPANDER</text>
      <rect x="352" y="238" width="78" height="20" rx="10" fill="#fff" stroke="#cfcdc4"/><text x="391" y="251">+16 INPUTS</text>
      <rect x="438" y="238" width="112" height="20" rx="10" fill="#fff" stroke="#cfcdc4"/><text x="494" y="251">PAIRS WITH HEARTH</text>
    </g>

    <!-- BOTTOM: I²C bus · power (no Ethernet on the expander) -->
    <rect x="300" y="286" width="116" height="22" rx="3" fill="#2f8f5f" stroke="#247048"/>
    <g fill="#16181d">
      <rect x="308" y="292" width="9" height="11" rx="1.5"/><rect x="328" y="292" width="9" height="11" rx="1.5"/>
      <rect x="348" y="292" width="9" height="11" rx="1.5"/><rect x="368" y="292" width="9" height="11" rx="1.5"/>
      <rect x="388" y="292" width="9" height="11" rx="1.5"/>
    </g>
    <text x="358" y="280" font-size="8" fill="#6c6f78" text-anchor="middle">I²C BUS</text>

    <rect x="456" y="286" width="86" height="22" rx="3" fill="#2f8f5f" stroke="#247048"/>
    <g fill="#16181d"><rect x="472" y="292" width="12" height="11" rx="1.5"/><rect x="500" y="292" width="12" height="11" rx="1.5"/></g>
    <text x="478" y="280" font-size="8" fill="#6c6f78" text-anchor="middle">24V+</text>
    <text x="506" y="280" font-size="8" fill="#6c6f78" text-anchor="middle">GND</text>
  </g>

  <!-- ── Wall switch (terminals: +24 V bottom, signal top) ──── -->
  <g>
    <rect x="648" y="150" width="116" height="120" rx="12" fill="#e8e6df" stroke="#c4c2b9" stroke-width="1.5"/>
    <rect x="676" y="170" width="60" height="62" rx="9" fill="#d3d0c7" stroke="#bdbab0"/>
    <path d="M686 218 L726 184" stroke="#9a978d" stroke-width="6" stroke-linecap="round"/>
    <circle cx="726" cy="184" r="6" fill="#ff8c5a"/>
    <text x="706" y="252" font-size="12" fill="#cfd3dc" text-anchor="middle">Wall switch</text>
    <rect x="642" y="184" width="10" height="12" rx="1.5" fill="#0c0d11" stroke="#525a6b"/>
    <rect x="642" y="226" width="10" height="12" rx="1.5" fill="#0c0d11" stroke="#525a6b"/>
  </g>

  <!-- ── Miniature Hearth gateway (the Ember pairs with it over I²C) ── -->
  <g>
    <rect x="248" y="372" width="186" height="84" rx="8" fill="#dcdad2" stroke="#b6b4ab" stroke-width="1.4"/>
    <!-- I²C terminal block (top, connection point) -->
    <rect x="312" y="366" width="56" height="13" rx="2.5" fill="#2f8f5f" stroke="#247048"/>
    <g fill="#16181d"><rect x="320" y="370" width="7" height="6" rx="1"/><rect x="333" y="370" width="7" height="6" rx="1"/><rect x="346" y="370" width="7" height="6" rx="1"/><rect x="356" y="370" width="7" height="6" rx="1"/></g>
    <!-- OSELIA hearth mark -->
    <g transform="translate(272,412)">
      <path d="M0 -9 L8.5 -3 L8.5 7 L-8.5 7 L-8.5 -3 Z" fill="#0d9488"/>
      <circle cx="0" cy="0.5" r="2.4" fill="#fff"/><circle cx="0" cy="0.5" r="1" fill="#0d9488"/>
    </g>
    <text x="294" y="404" font-size="13" font-weight="800" fill="#23262c">Hearth <tspan font-size="10" font-weight="600" fill="#6c6f78">DI16-G</tspan></text>
    <text x="294" y="419" font-size="8.5" fill="#6c6f78">gateway · main board (0x20)</text>
    <text x="294" y="433" font-size="8.5" fill="#0f766e">Ethernet → Home Assistant</text>
  </g>

  <!-- ── Wiring ─────────────────────────────────────────────── -->
  <!-- +24 V: PSU -> Ember power block (24V+) — low, clear of the gateway -->
  <path d="M118 318 V492 H472 V308" fill="none" stroke="#ff6a2b" stroke-width="2.5"/>
  <!-- 0 V: PSU -> Ember power block (GND) -->
  <path d="M146 318 V478 H500 V308" fill="none" stroke="#8b93a5" stroke-width="2.5"/>
  <!-- +24 V feed to switch (bottom terminal) -->
  <path d="M472 308 V340 H626 V232 H642" fill="none" stroke="#ff6a2b" stroke-width="2.5"/>
  <!-- switch signal (top terminal) -> input I1 (right-most) -->
  <path d="M642 190 H612 V44 H558 V62" fill="none" stroke="#ffb02e" stroke-width="2.5"/>
  <text x="600" y="40" font-size="9" fill="#ffb02e" text-anchor="end">switch → input I1 (right)</text>
  <!-- PSU ground -> common ground (3rd terminal from the left) -->
  <path d="M146 318 V336 H196 V44 H270 V62" fill="none" stroke="#8b93a5" stroke-width="2.5"/>
  <text x="214" y="40" font-size="9" fill="#9aa1b1" text-anchor="start">PSU GND → common GND</text>
  <!-- I²C bus: Ember -> Hearth gateway -->
  <path d="M358 308 V344 H340 V366" fill="none" stroke="#a78bfa" stroke-width="2.5"/>
  <text x="366" y="334" font-size="10" fill="#c4b5fd">I²C bus → Hearth</text>
</svg>
