# ─────────────────────────────────────────────────────────────────────────────
# Decap CMS configuration for OSELIA web.
#
# Two ways to edit:
#   1. LOCAL  — run `npm run cms` (decap-server) + `npm run dev`, open
#               http://localhost:4321/oselia-web/admin/  →  writes straight to the
#               files on disk. No auth, no GitHub. Best for drafting.
#   2. ONLINE — open https://vmyronovych.github.io/oselia-web/admin/, log in with
#               GitHub. Edits are committed to the repo, which triggers the Pages
#               deploy. Requires the OAuth proxy (see oauth-proxy/ + base_url below).
# ─────────────────────────────────────────────────────────────────────────────

backend:
  name: github
  repo: vmyronovych/oselia-web
  branch: main
  # URL of the deployed OAuth proxy (see oauth-proxy/README.md). The proxy performs
  # the GitHub OAuth handshake that GitHub Pages can't do on its own.
  base_url: https://oselia-cms-auth.YOUR-SUBDOMAIN.workers.dev
  auth_endpoint: /auth

# Lets you edit locally against files on disk via `npx decap-server`.
local_backend: true

# Open authoring would let anyone with a GitHub account open PRs; keep it simple.
publish_mode: simple

media_folder: "public/uploads"
public_folder: "/oselia-web/uploads"

site_url: https://vmyronovych.github.io/oselia-web
display_url: https://vmyronovych.github.io/oselia-web
logo_url: https://vmyronovych.github.io/oselia-web/favicon.svg

collections:
  # ── Products ───────────────────────────────────────────────────────────────
  - name: products
    label: Products
    label_singular: Product
    folder: src/content/products
    create: true
    slug: "{{slug}}"
    identifier_field: title
    summary: "{{title}} ({{sku}})"
    fields:
      - { name: title, label: Title, widget: string }
      - { name: sku, label: SKU, widget: string, hint: "e.g. DI16-G" }
      - { name: tagline, label: Tagline, widget: string }
      - { name: summary, label: Summary, widget: text }
      - name: role
        label: Role
        widget: select
        options: [gateway, expander]
        default: expander
      - { name: order, label: Sort order, widget: number, value_type: int, default: 10 }
      - { name: heroImage, label: Hero image, widget: image, required: false }
      - name: specs
        label: Specifications
        widget: list
        required: false
        summary: "{{fields.label}}: {{fields.value}}"
        fields:
          - { name: label, label: Label, widget: string }
          - { name: value, label: Value, widget: string }
      - name: features
        label: Feature cards
        widget: list
        required: false
        summary: "{{fields.title}}"
        fields:
          - { name: title, label: Title, widget: string }
          - { name: body, label: Body, widget: text }
      - { name: draft, label: Draft (hide from site), widget: boolean, default: false }
      - { name: body, label: Body, widget: markdown }

  # ── Docs ───────────────────────────────────────────────────────────────────
  - name: docs
    label: Documentation
    label_singular: Doc page
    folder: src/content/docs
    create: true
    slug: "{{slug}}"
    identifier_field: title
    summary: "{{section}} · {{title}}"
    fields:
      - { name: title, label: Title, widget: string }
      - { name: description, label: Description, widget: text }
      - name: section
        label: Section
        widget: string
        hint: "Sidebar group, e.g. 'Getting Started' or 'Reference'"
        default: Guides
      - { name: order, label: Sort order, widget: number, value_type: int, default: 10 }
      - { name: draft, label: Draft (hide from site), widget: boolean, default: false }
      - { name: body, label: Body, widget: markdown }
