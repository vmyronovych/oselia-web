<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 480" role="img"
     aria-label="A 24 V power supply, the OSELIA Hearth DI16-G gateway and a wall switch mounted on a DIN rail"
     font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <rect x="6" y="6" width="828" height="468" rx="16" fill="#121419" stroke="#262b36"/>

  <!-- ── DIN rail ───────────────────────────────────────────── -->
  <g>
    <rect x="70" y="52" width="548" height="14" rx="2" fill="#5b606c"/>
    <rect x="70" y="52" width="548" height="4"  rx="2" fill="#727885"/>
    <g fill="#383d47">
      <rect x="104" y="57" width="18" height="5" rx="1"/><rect x="156" y="57" width="18" height="5" rx="1"/>
      <rect x="208" y="57" width="18" height="5" rx="1"/><rect x="260" y="57" width="18" height="5" rx="1"/>
      <rect x="312" y="57" width="18" height="5" rx="1"/><rect x="364" y="57" width="18" height="5" rx="1"/>
      <rect x="416" y="57" width="18" height="5" rx="1"/><rect x="468" y="57" width="18" height="5" rx="1"/>
      <rect x="520" y="57" width="18" height="5" rx="1"/><rect x="572" y="57" width="18" height="5" rx="1"/>
    </g>
    <text x="160" y="47" font-size="11" fill="#6f7689" text-anchor="middle">DIN rail</text>
  </g>

  <!-- ── AC mains source ────────────────────────────────────── -->
  <g>
    <circle cx="40" cy="250" r="19" fill="none" stroke="#8b93a5" stroke-width="2"/>
    <path d="M31 250 q4.5 -7 9 0 t9 0" fill="none" stroke="#8b93a5" stroke-width="2"/>
    <text x="40" y="290" font-size="10.5" fill="#9aa1b1" text-anchor="middle">~230 V AC</text>
    <path d="M59 244 H82" stroke="#8b93a5" stroke-width="2"/>
    <path d="M59 258 H82" stroke="#8b93a5" stroke-width="2"/>
  </g>

  <!-- ── Power supply module (light-gray DIN PSU) ───────────── -->
  <g>
    <rect x="120" y="60" width="20" height="9" rx="2" fill="#9aa0ab"/>
    <rect x="86" y="66" width="92" height="250" rx="7" fill="#d8d6ce" stroke="#b4b2a8" stroke-width="1.5"/>
    <rect x="94" y="74" width="76" height="40" rx="3" fill="#c8c6bd"/>
    <g stroke="#b0aea4" stroke-width="1.4">
      <path d="M102 82 H162"/><path d="M102 90 H162"/><path d="M102 98 H162"/><path d="M102 106 H162"/>
    </g>
    <text x="132" y="160" font-size="20" font-weight="700" fill="#2a2d33" text-anchor="middle">24 V</text>
    <text x="132" y="180" font-size="10" fill="#6c6f78" text-anchor="middle">DC power</text>
    <text x="132" y="194" font-size="10" fill="#6c6f78" text-anchor="middle">supply</text>
    <rect x="80" y="226" width="9" height="42" rx="2" fill="#2f8f5f" stroke="#247048"/>
    <circle cx="84.5" cy="240" r="2.4" fill="#e08a3c"/><circle cx="84.5" cy="254" r="2.4" fill="#e08a3c"/>
    <rect x="104" y="300" width="56" height="18" rx="3" fill="#2f8f5f" stroke="#247048"/>
    <circle cx="118" cy="309" r="2.6" fill="#e08a3c"/><circle cx="146" cy="309" r="2.6" fill="#e08a3c"/>
    <text x="118" y="296" font-size="8.5" fill="#3a3d44" text-anchor="middle">+24V</text>
    <text x="146" y="296" font-size="8.5" fill="#3a3d44" text-anchor="middle">0V</text>
  </g>

  <!-- ── OSELIA Hearth DI16-G (real module look) ────────────── -->
  <g>
    <rect x="300" y="60" width="20" height="9" rx="2" fill="#9aa0ab"/>
    <rect x="206" y="66" width="392" height="250" rx="9" fill="#dcdad2" stroke="#b6b4ab" stroke-width="1.5"/>
    <g fill="#c6c4bb" stroke="#b0aea4"><circle cx="222" cy="82" r="5"/><circle cx="582" cy="82" r="5"/><circle cx="222" cy="300" r="5"/><circle cx="582" cy="300" r="5"/></g>

    <!-- TOP: 16 switch inputs (I1 rightmost) + 3 grounds on the left -->
    <rect x="222" y="62" width="362" height="22" rx="3" fill="#2f8f5f" stroke="#247048"/>
    <g fill="#16181d">
      <rect x="230" y="68" width="9" height="11" rx="1.5"/><rect x="248" y="68" width="9" height="11" rx="1.5"/>
      <rect x="266" y="68" width="9" height="11" rx="1.5"/><rect x="284" y="68" width="9" height="11" rx="1.5"/>
      <rect x="302" y="68" width="9" height="11" rx="1.5"/><rect x="320" y="68" width="9" height="11" rx="1.5"/>
      <rect x="338" y="68" width="9" height="11" rx="1.5"/><rect x="356" y="68" width="9" height="11" rx="1.5"/>
      <rect x="374" y="68" width="9" height="11" rx="1.5"/><rect x="392" y="68" width="9" height="11" rx="1.5"/>
      <rect x="410" y="68" width="9" height="11" rx="1.5"/><rect x="428" y="68" width="9" height="11" rx="1.5"/>
      <rect x="446" y="68" width="9" height="11" rx="1.5"/><rect x="464" y="68" width="9" height="11" rx="1.5"/>
      <rect x="482" y="68" width="9" height="11" rx="1.5"/><rect x="500" y="68" width="9" height="11" rx="1.5"/>
      <rect x="518" y="68" width="9" height="11" rx="1.5"/><rect x="536" y="68" width="9" height="11" rx="1.5"/>
      <rect x="554" y="68" width="9" height="11" rx="1.5"/>
    </g>
    <!-- ground markers on the three left-most terminals -->
    <g fill="#4cc08a"><circle cx="234.5" cy="73.5" r="2"/><circle cx="252.5" cy="73.5" r="2"/><circle cx="270.5" cy="73.5" r="2"/></g>
    <!-- connected input marker (I1, right-most) -->
    <circle cx="558.5" cy="73.5" r="2" fill="#ffb02e"/>
    <g font-size="6.5" fill="#5f6b63" text-anchor="middle">
      <text x="234.5" y="97">iso</text><text x="252.5" y="97">iso</text><text x="270.5" y="97">COM</text>
    </g>
    <text x="288.5" y="97" font-size="7" fill="#6c6f78" text-anchor="middle">I16</text>
    <text x="558.5" y="97" font-size="7" fill="#6c6f78" text-anchor="middle">I1</text>
    <text x="425" y="97" font-size="8.5" fill="#6c6f78" text-anchor="middle">24 V switch inputs</text>

    <!-- centred printed white label -->
    <rect x="262" y="104" width="280" height="162" rx="5" fill="#f5f4ef" stroke="#dcdad1"/>
    <!-- real OSELIA logo (icon + wordmark + tagline) -->
    <svg x="345" y="112" width="114" height="61" viewBox="0 53 92 49" preserveAspectRatio="xMidYMid meet">
      <g transform="matrix(1 0 0 -1 0 172.91)">
        <path d="M32.88,93.54 L58.96,93.54 L58.96,109.98 L45.92,117.92 L32.88,109.98 Z " fill="#0d9488"/>
        <circle cx="45.92" cy="102.33" r="3.26" fill="#ffffff"/>
        <circle cx="45.92" cy="102.33" r="1.28" fill="#0d9488"/>
        <text transform="translate(26.17,82.20) scale(1,-1)" font-family="Helvetica, Arial, sans-serif" font-weight="bold" font-size="9.40" fill="#1f2937">OSELIA</text>
        <text transform="translate(23.14,72.00) scale(1,-1)" font-family="Helvetica, Arial, sans-serif" font-weight="normal" font-size="3.50" letter-spacing="0.35" fill="#0f766e">SMART AUTOMATION</text>
      </g>
    </svg>
    <text x="402" y="206" font-size="23" font-weight="800" fill="#23262c" text-anchor="middle">Hearth <tspan font-size="15" font-weight="600" fill="#6c6f78">DI16-G</tspan></text>
    <text x="402" y="224" font-size="9.5" fill="#6c6f78" text-anchor="middle">16-channel 24 V discrete input gateway</text>
    <g font-size="9" fill="#3a3d44" text-anchor="middle">
      <rect x="278" y="238" width="52" height="20" rx="10" fill="#fff" stroke="#cfcdc4"/><text x="304" y="251">MQTT</text>
      <rect x="336" y="238" width="100" height="20" rx="10" fill="#fff" stroke="#cfcdc4"/><text x="386" y="251">Home Assistant</text>
      <rect x="442" y="238" width="86" height="20" rx="10" fill="#fff" stroke="#cfcdc4"/><text x="485" y="251">1× · 2× · LONG</text>
    </g>

    <!-- BOTTOM: Ethernet · I²C bus · power -->
    <rect x="226" y="280" width="42" height="30" rx="3" fill="#9fa4ab" stroke="#7d828a"/>
    <rect x="237" y="278" width="20" height="6" rx="1" fill="#7d828a"/>
    <text x="247" y="274" font-size="8" fill="#6c6f78" text-anchor="middle">ETHERNET</text>

    <rect x="322" y="286" width="116" height="22" rx="3" fill="#2f8f5f" stroke="#247048"/>
    <g fill="#16181d">
      <rect x="330" y="292" width="9" height="11" rx="1.5"/><rect x="350" y="292" width="9" height="11" rx="1.5"/>
      <rect x="370" y="292" width="9" height="11" rx="1.5"/><rect x="390" y="292" width="9" height="11" rx="1.5"/>
      <rect x="410" y="292" width="9" height="11" rx="1.5"/>
    </g>
    <text x="380" y="280" font-size="8" fill="#6c6f78" text-anchor="middle">I²C BUS</text>

    <rect x="470" y="286" width="86" height="22" rx="3" fill="#2f8f5f" stroke="#247048"/>
    <g fill="#16181d"><rect x="486" y="292" width="12" height="11" rx="1.5"/><rect x="514" y="292" width="12" height="11" rx="1.5"/></g>
    <text x="492" y="280" font-size="8" fill="#6c6f78" text-anchor="middle">24V+</text>
    <text x="520" y="280" font-size="8" fill="#6c6f78" text-anchor="middle">GND</text>
  </g>

  <!-- ── Wall switch ────────────────────────────────────────── -->
  <g>
    <rect x="648" y="150" width="116" height="120" rx="12" fill="#e8e6df" stroke="#c4c2b9" stroke-width="1.5"/>
    <rect x="676" y="170" width="60" height="62" rx="9" fill="#d3d0c7" stroke="#bdbab0"/>
    <path d="M686 218 L726 184" stroke="#9a978d" stroke-width="6" stroke-linecap="round"/>
    <circle cx="726" cy="184" r="6" fill="#ff8c5a"/>
    <text x="706" y="252" font-size="12" fill="#cfd3dc" text-anchor="middle">Wall switch</text>
    <rect x="642" y="190" width="10" height="12" rx="1.5" fill="#0c0d11" stroke="#525a6b"/>
    <rect x="642" y="232" width="10" height="12" rx="1.5" fill="#0c0d11" stroke="#525a6b"/>
  </g>

  <!-- ── Wiring ─────────────────────────────────────────────── -->
  <!-- +24 V: PSU -> Hearth power block (24V+) -->
  <path d="M118 318 V358 H492 V308" fill="none" stroke="#ff6a2b" stroke-width="2.5"/>
  <!-- 0 V: PSU -> Hearth power block (GND) -->
  <path d="M146 318 V344 H520 V308" fill="none" stroke="#8b93a5" stroke-width="2.5"/>
  <!-- +24 V feed to switch -->
  <path d="M492 308 V332 H626 V196 H642" fill="none" stroke="#ff6a2b" stroke-width="2.5"/>
  <!-- switch -> input I1 (right-most top terminal) -->
  <path d="M642 238 H612 V44 H558 V62" fill="none" stroke="#ffb02e" stroke-width="2.5"/>
  <text x="600" y="40" font-size="9" fill="#ffb02e" text-anchor="end">switch → input I1 (right)</text>
  <!-- PSU ground -> common ground (3rd terminal from the left) -->
  <path d="M146 318 V336 H196 V44 H270 V62" fill="none" stroke="#8b93a5" stroke-width="2.5"/>
  <text x="214" y="40" font-size="9" fill="#9aa1b1" text-anchor="start">PSU GND → common GND</text>
  <!-- Ethernet -> Home Assistant -->
  <path d="M247 310 V340 H300" fill="none" stroke="#45b6c4" stroke-width="2.5"/>
  <path d="M296 335 l8 5 l-8 5 z" fill="#45b6c4"/>
  <text x="312" y="337" font-size="12" fill="#cfd3dc">Ethernet</text>
  <text x="312" y="353" font-size="11" fill="#9aa1b1">→ Home Assistant</text>
</svg>
