<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 272" role="img"
     aria-label="One OSELIA Hearth gateway plus up to seven Ember expanders chained on a shared I²C field bus, addresses 0x20 to 0x27"
     font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <rect x="6" y="6" width="548" height="260" rx="14" fill="#121419" stroke="#262b36"/>

  <!-- shared DIN rail behind the modules -->
  <g>
    <rect x="16" y="104" width="528" height="18" rx="2" fill="#5b606c"/>
    <rect x="16" y="104" width="528" height="3" rx="2" fill="#727885"/>
  </g>

  <!-- ── Module 1 — Hearth (board 1, 0x20) ──────────────────── -->
  <g>
    <text x="85" y="40" font-size="8" fill="#6f7689" text-anchor="middle">board 1</text>
    <rect x="20" y="50" width="130" height="124" rx="8" fill="#dcdad2" stroke="#b6b4ab" stroke-width="1.4"/>
    <rect x="40" y="46" width="90" height="11" rx="2" fill="#2f8f5f" stroke="#247048"/>
    <g fill="#16181d"><rect x="46" y="49" width="6" height="5" rx="1"/><rect x="60" y="49" width="6" height="5" rx="1"/><rect x="74" y="49" width="6" height="5" rx="1"/><rect x="88" y="49" width="6" height="5" rx="1"/><rect x="102" y="49" width="6" height="5" rx="1"/><rect x="116" y="49" width="6" height="5" rx="1"/></g>
    <g transform="translate(85,0)"><g transform="translate(0,82) scale(0.18)"><path d="M-34 -2 L0 -31 L34 -2" fill="none" stroke="#d65a4a" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/><rect x="-25" y="-2" width="50" height="35" rx="7" fill="none" stroke="#d65a4a" stroke-width="6"/><circle cx="0" cy="15.5" r="7.5" fill="#d65a4a"/></g></g>
    <text x="85" y="111" text-anchor="middle"><tspan font-size="12.5" font-weight="800" fill="#23262c">Hearth </tspan><tspan font-size="9" font-weight="600" fill="#6c6f78">DI16-G</tspan></text>
    <rect x="59" y="126" width="52" height="18" rx="9" fill="#fff" stroke="#cfcdc4"/>
    <text x="85" y="139" font-size="10" fill="#3a3d44" text-anchor="middle">0x20</text>
    <rect x="70" y="166" width="30" height="11" rx="2" fill="#2f8f5f" stroke="#247048"/>
    <g fill="#16181d"><rect x="78" y="169" width="5" height="5" rx="1"/><rect x="88" y="169" width="5" height="5" rx="1"/></g>
  </g>
  <!-- Hearth -> Home Assistant hint -->
  <text x="85" y="24" font-size="8" fill="#0f9b80" text-anchor="middle">↑ Ethernet → Home Assistant</text>

  <!-- ── Module 2 — Ember (board 2, 0x21) ───────────────────── -->
  <g>
    <text x="231" y="40" font-size="8" fill="#6f7689" text-anchor="middle">board 2</text>
    <rect x="166" y="50" width="130" height="124" rx="8" fill="#dcdad2" stroke="#b6b4ab" stroke-width="1.4"/>
    <rect x="186" y="46" width="90" height="11" rx="2" fill="#2f8f5f" stroke="#247048"/>
    <g fill="#16181d"><rect x="192" y="49" width="6" height="5" rx="1"/><rect x="206" y="49" width="6" height="5" rx="1"/><rect x="220" y="49" width="6" height="5" rx="1"/><rect x="234" y="49" width="6" height="5" rx="1"/><rect x="248" y="49" width="6" height="5" rx="1"/><rect x="262" y="49" width="6" height="5" rx="1"/></g>
    <g transform="translate(231,0)"><g transform="translate(0,82) scale(0.18)"><path d="M-34 -2 L0 -31 L34 -2" fill="none" stroke="#d65a4a" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/><rect x="-25" y="-2" width="50" height="35" rx="7" fill="none" stroke="#d65a4a" stroke-width="6"/><circle cx="0" cy="15.5" r="7.5" fill="#d65a4a"/></g></g>
    <text x="231" y="111" text-anchor="middle"><tspan font-size="12.5" font-weight="800" fill="#23262c">Ember </tspan><tspan font-size="9" font-weight="600" fill="#6c6f78">DI-16X</tspan></text>
    <rect x="205" y="126" width="52" height="18" rx="9" fill="#fff" stroke="#cfcdc4"/>
    <text x="231" y="139" font-size="10" fill="#3a3d44" text-anchor="middle">0x21</text>
    <rect x="216" y="166" width="30" height="11" rx="2" fill="#2f8f5f" stroke="#247048"/>
    <g fill="#16181d"><rect x="224" y="169" width="5" height="5" rx="1"/><rect x="234" y="169" width="5" height="5" rx="1"/></g>
  </g>

  <!-- ── ellipsis (0x22 … 0x26) ─────────────────────────────── -->
  <g text-anchor="middle">
    <text x="350" y="84" font-size="8" fill="#7b8294">up to 7 expanders</text>
    <g fill="#6c6f78"><circle cx="335" cy="108" r="3"/><circle cx="350" cy="108" r="3"/><circle cx="365" cy="108" r="3"/></g>
    <text x="350" y="139" font-size="9" fill="#9aa1b1">0x22 … 0x26</text>
  </g>

  <!-- ── Module 8 — Ember (board 8, 0x27) ───────────────────── -->
  <g>
    <text x="469" y="40" font-size="8" fill="#6f7689" text-anchor="middle">board 8</text>
    <rect x="404" y="50" width="130" height="124" rx="8" fill="#dcdad2" stroke="#b6b4ab" stroke-width="1.4"/>
    <rect x="424" y="46" width="90" height="11" rx="2" fill="#2f8f5f" stroke="#247048"/>
    <g fill="#16181d"><rect x="430" y="49" width="6" height="5" rx="1"/><rect x="444" y="49" width="6" height="5" rx="1"/><rect x="458" y="49" width="6" height="5" rx="1"/><rect x="472" y="49" width="6" height="5" rx="1"/><rect x="486" y="49" width="6" height="5" rx="1"/><rect x="500" y="49" width="6" height="5" rx="1"/></g>
    <g transform="translate(469,0)"><g transform="translate(0,82) scale(0.18)"><path d="M-34 -2 L0 -31 L34 -2" fill="none" stroke="#d65a4a" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/><rect x="-25" y="-2" width="50" height="35" rx="7" fill="none" stroke="#d65a4a" stroke-width="6"/><circle cx="0" cy="15.5" r="7.5" fill="#d65a4a"/></g></g>
    <text x="469" y="111" text-anchor="middle"><tspan font-size="12.5" font-weight="800" fill="#23262c">Ember </tspan><tspan font-size="9" font-weight="600" fill="#6c6f78">DI-16X</tspan></text>
    <rect x="443" y="126" width="52" height="18" rx="9" fill="#fff" stroke="#cfcdc4"/>
    <text x="469" y="139" font-size="10" fill="#3a3d44" text-anchor="middle">0x27</text>
    <rect x="454" y="166" width="30" height="11" rx="2" fill="#2f8f5f" stroke="#247048"/>
    <g fill="#16181d"><rect x="462" y="169" width="5" height="5" rx="1"/><rect x="472" y="169" width="5" height="5" rx="1"/></g>
  </g>

  <!-- ── shared I²C field bus ───────────────────────────────── -->
  <path d="M85 177 V206 M231 177 V206 M469 177 V206 M85 206 H469" fill="none" stroke="#a78bfa" stroke-width="2.5"/>
  <text x="277" y="226" font-size="9" fill="#c4b5fd" text-anchor="middle">shared I²C field bus — SDA · SCL · wired-OR INT</text>
  <text x="280" y="248" font-size="9.5" fill="#aab0bf" text-anchor="middle">One Hearth + up to seven Ember (0x20 … 0x27) = 128 inputs</text>
</svg>
